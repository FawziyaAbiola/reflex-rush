<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflex Rush | Test Your Clicking Speed</title>

<link rel="icon" type="image/png" href="./assets/favicon.png" />

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <meta
      name="keywords"
      content="Reflex Rush, clicking game, JavaScript game, reflex test, speed game"
    />

    <meta name="author" content="Fawziya Abiola" />

    <meta
      name="google-site-verification"
      content="82kouPLPjg2j5urGO3oNonxhcQwOh7bi2TDt_PAnb8U"
    />
  </head>

  <body>
    <div class="container">
      <h3 class="heading">Reflex Rush</h3>

      <i class="comment">
        Tap as fast as you can <br />
        Beat the highest score before time runs out
      </i>

      <div class="buttons">
        <button class="add">+</button>
        <button class="minus">-</button>
      </div>

      <div>
        <p class="num">0</p>

        <p class="top-count">
          Highest Count:
          <span class="highest"></span>
        </p>

        <p class="timer">
          Time Left:
          <span class="time">10</span>s
        </p>

        <button class="start">Start Game</button>
        <button class="reset">Reset</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
